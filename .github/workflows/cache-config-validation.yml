name: cache-config-validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  json-yaml-validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: json-yaml-validate
        uses: GrantBirki/json-yaml-validate@v4.0.0
        with:
          comment: "true"
          json_schema: "src/cache/config/schema.json"
          base_dir: src/cache/src/cache
          json_exclude_regex: ".*/vendor/.*"
          yaml_exclude_regex: ".*/vendor/.*"
